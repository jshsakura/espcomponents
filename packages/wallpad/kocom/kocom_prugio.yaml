button:
  # 엘리베이터 호출
  - platform: uartex
    name: "Elevator Call"
    icon: "mdi:elevator"
    command_on:
      data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x44, 0x00, 0x01, 0x03, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      ack: [0x30, 0xdc]

  # 일괄소등 스위치 - 다양한 패턴 테스트
  - platform: template
    name: "All Lights Off"
    icon: "mdi:lightbulb-group-off"
    on_press:
      # 패턴 1: 기본 일괄소등 (0x3B 디바이스)
      - uartex.write:
          data: [0x30, 0xbc, 0x00, 0x3b, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
          ack: [0x30, 0xdc]
      - delay: 500ms
      # 패턴 2: 전체 조명 제어 (0x0E 디바이스, Room FF)
      - uartex.write:
          data: [0x30, 0xbc, 0x00, 0x0e, 0xff, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
          ack: [0x30, 0xdc]
      - delay: 500ms
      # 패턴 3: 월패드 제어 (0x01 디바이스)
      - uartex.write:
          data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x3b, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
          ack: [0x30, 0xdc]
