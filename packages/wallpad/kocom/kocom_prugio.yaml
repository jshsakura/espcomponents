  # 🌡️ 온도 센서 상세 스캔 (발견된 난방 시스템 기반)
  - platform: template
    name: "Temperature Detail Scanner"
    icon: "mdi:thermometer-check"
    on_press:
      # 모든 Room의 난방 시스템 상태 확인
      - repeat:
          count: 10
          then:
            - uartex.write:
                data: !lambda |-
                  uint8_t room = id(temp_scanner_counter);
                  return {0x30, 0xbc, 0x00, 0x36, room, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00};
                ack: [0x30, 0xdc]
            - delay: 400ms
            - globals.set:
                id: temp_scanner_counter
                value: !lambda "return (id(temp_scanner_counter) + 1) % 10;"

# 전역 변수 - 스캐너 카운터용
globals:
  - id: ultra_scanner_counter
    type: int
    initial_value: "0"
  - id: temp_scanner_counter
    type: int
    initial_value: "0"
