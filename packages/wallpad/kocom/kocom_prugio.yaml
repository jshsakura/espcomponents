  # 🔍 초고속 전체 디바이스 스캐너 - 모든 가능한 조합 탐지
  - platform: template
    name: "Ultra Device Scanner"
    icon: "mdi:magnify-scan"
    on_press:
      # 1단계: 알려진 디바이스 코드들 스캔 (0x01-0xFF)
      - repeat:
          count: 15
          then:
            - uartex.write:
                data: !lambda |-
                  uint8_t device_codes[] = {0x01, 0x0e, 0x2c, 0x36, 0x3b, 0x44, 0x48, 0x49, 0x4a, 0x50, 0x60, 0x70, 0x80, 0x90, 0xa0};
                  uint8_t device = device_codes[id(ultra_scanner_counter) % 15];
                  uint8_t room = id(ultra_scanner_counter) / 15;
                  return {0x30, 0xbc, 0x00, device, room, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00};
                ack: [0x30, 0xdc]
            - delay: 200ms
            - globals.set:
                id: ultra_scanner_counter
                value: !lambda "return id(ultra_scanner_counter) + 1;"

