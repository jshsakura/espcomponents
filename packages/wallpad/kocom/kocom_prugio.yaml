uart:
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO22
  tx_pin: GPIO19

external_components:
  - source: github://eigger/espcomponents@latest
    components: [uartex]
    refresh: always

uartex:
  rx_timeout: 10ms
  tx_delay: 50ms
  tx_timeout: 500ms
  tx_retry_cnt: 3

  rx_header: [0xAA, 0x55]
  rx_footer: [0x0D, 0x0D]
  tx_header: [0xAA, 0x55]
  tx_footer: [0x0D, 0x0D]

  rx_checksum: add_no_header
  tx_checksum: add_no_header

  version:
    disabled: False
  error:
    disabled: False
  log:
    disabled: False

# 디버깅을 위한 로그 센서 추가
text_sensor:
  - platform: uartex
    name: "Raw Packet Log"
    icon: "mdi:bug"
    state:
      data: [0xAA, 0x55]
      mask: [0xFF, 0xFF]
    lambda: |-
      std::string hex_string = "";
      for (int i = 0; i < len; i++) {
        char hex_char[4];
        sprintf(hex_char, "%02X ", data[i]);
        hex_string += hex_char;
      }
      return hex_string;

  - platform: uartex
    name: "Elevator Direction"
    icon: "mdi:elevator"
    state:
      data: [0x30, 0xd0, 0x00, 0x01, 0x00, 0x44, 0x00]
      mask: [0xff, 0xf0, 0xff, 0xff, 0xff, 0xff, 0xff]
    lambda: |-
      if (check_value(8, 0x00, data, len)) return "정지";
      if (check_value(8, 0x01, data, len)) return "하강";
      if (check_value(8, 0x02, data, len)) return "상승";
      if (check_value(8, 0x03, data, len)) return "도착";
      return "Unknown";

# 현관문 기능 (kocom_door.yaml에서 가져옴)
binary_sensor:
  - platform: uartex
    id: door_bell
    name: "Door Bell"
    icon: "mdi:bell-ring"
    state:
      data: [0xAA, 0x55, 0x70, 0x90, 0x02, 0x02]
      mask: [0xFF, 0xFF, 0xF0, 0xF0, 0xFF, 0xFF]
    state_on:
      offset: 15
      data: [0x01]
    state_off:
      offset: 15
      data: [0x02]

  - platform: uartex
    id: door_bell_common
    name: "Door Bell Common"
    icon: "mdi:bell-ring"
    state:
      data: [0xAA, 0x55, 0x70, 0x90, 0x02, 0x08]
      mask: [0xFF, 0xFF, 0xF0, 0xF0, 0xFF, 0xFF]
    state_on:
