      length: 1
      precision: 0
    state_off:
      offset: 8
      data: [0x00]
      mask: [0xF0]
    state_heat:
      offset: 8
      data: [0x10]
      mask: [0xF0]
    command_off: !lambda |-
      float target = std::max(15.0f, id(master_bedroom_heater).target_temperature);
      return {{0x30, 0xbc, 0x00, 0x36, 0x01, 0x01, 0x00, 0x00, 0x00, 0x00, (uint8_t)target, 0x00, 0x00, 0x00, 0x00, 0x00},{0x30, 0xdc}};
